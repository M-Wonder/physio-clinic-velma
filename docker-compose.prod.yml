# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: '3.9'

services:
  backend:
    environment:
      - DEBUG=False
      - DJANGO_ENV=production
    restart: always

  frontend:
    build:
      target: production
    command: nginx -g 'daemon off;'
    restart: always

  celery_worker:
    restart: always

  celery_beat:
    restart: always

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # Mount your SSL certs here
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
