# Render deployment configuration
# Docs: https://render.com/docs/render-yaml-reference

services:
  # ── Django Backend (Web Service) ──────────────────────────────
  - type: web
    name: physio-clinic-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn physio_clinic.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: physio_clinic.settings.base
      - key: SECRET_KEY
        sync: false        # Set in Render dashboard
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: ENCRYPTION_KEY
        sync: false        # Set in Render dashboard
      - key: POSTGRES_HOST
        fromDatabase:
          name: physio-clinic-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: physio-clinic-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: physio-clinic-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: physio-clinic-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: physio-clinic-db
          property: password
      - key: REDIS_URL
        fromService:
          name: physio-clinic-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: physio-clinic-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: physio-clinic-redis
          type: redis
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_PHONE_NUMBER
        value: ""

  # ── React Frontend (Static Site) ─────────────────────────────
  - type: web
    name: physio-clinic-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://physio-clinic-backend.onrender.com/api
      - key: VITE_APP_NAME
        value: PhysioClinic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback for React Router

databases:
  - name: physio-clinic-db
    plan: free

  - name: physio-clinic-redis
    plan: free
    ipAllowList: []