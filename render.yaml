databases:
  - name: physio-clinic-db
    plan: starter
    region: oregon
    databaseName: physio_clinic
    user: physio_clinic_user

redis:
  - name: physio-clinic-redis
    plan: starter
    region: oregon

services:
  # Django Backend API Service
  - type: web
    name: physio-clinic-backend
    runtime: python
    repo: https://github.com/M-Wonder/physio-clinic-velma
    plan: starter
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements/production.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: ./entrypoint.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: physio-clinic-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: physio-clinic-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: 15
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: 7
      - key: POSTGRES_DB
        fromDatabase:
          name: physio-clinic-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: physio-clinic-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: physio-clinic-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: physio-clinic-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: physio-clinic-db
          property: port
      - key: CORS_ALLOW_ALL_ORIGINS
        value: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://physio-clinic-frontend.onrender.com,http://localhost:3030
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@physio-clinic.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  # React Frontend Static Site
  - type: web
    name: physio-clinic-frontend
    runtime: static
    repo: https://github.com/M-Wonder/physio-clinic-velma
    plan: starter
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://physio-clinic-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Celery Worker (Background Tasks)
  - type: worker
    name: physio-clinic-celery-worker
    runtime: python
    repo: https://github.com/M-Wonder/physio-clinic-velma
    plan: starter
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements/production.txt
    startCommand: celery -A physio_clinic worker -l info -Q default,notifications,reminders
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: physio-clinic-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: physio-clinic-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: physio-clinic-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: false

  # Celery Beat (Scheduled Tasks)
  - type: worker
    name: physio-clinic-celery-beat
    runtime: python
    repo: https://github.com/M-Wonder/physio-clinic-velma
    plan: starter
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements/production.txt
    startCommand: celery -A physio_clinic beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: physio-clinic-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: physio-clinic-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: physio-clinic-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: false